<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rate Your Support Experience</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #f0f4ff 0%, #e8f5e9 100%); min-height: 100vh; }
    .star-btn { font-size: 2.5rem; cursor: pointer; color: #d1d5db; transition: color .15s; border: none; background: none; padding: 0 6px; }
    .star-btn:hover, .star-btn.selected { color: #f59e0b; }
    .ticket-badge { background: #1d6fa4; color: #fff; border-radius: 8px; padding: 6px 14px; font-size: .85rem; }
  </style>
</head>
<body>
<div class="min-vh-100 d-flex align-items-center justify-content-center p-3">
  <div class="card border-0 shadow-lg rounded-4" style="max-width:520px;width:100%;">
    <div class="card-body p-5 text-center">
      <div class="mb-3">
        <i class="fas fa-headset fa-3x text-primary opacity-75"></i>
      </div>
      <h2 class="fw-bold mb-1">How did we do?</h2>
      <p class="text-muted mb-3">Your support ticket has been resolved.</p>
      <div class="mb-4">
        <span class="ticket-badge"><i class="fas fa-ticket-alt me-1"></i>{{ ticket.sl_no }}</span>
        <div class="small text-muted mt-2">{{ ticket.issue_type or 'Support Request' }}</div>
      </div>

      <form method="POST">
        <div class="mb-4">
          <p class="fw-semibold mb-2">Select your rating:</p>
          <div id="stars" class="d-flex justify-content-center gap-1">
            {% for i in range(1, 6) %}
            <button type="button" class="star-btn" data-val="{{ i }}" onclick="selectStar({{ i }})" title="{{ i }} star{{ 's' if i > 1 }}">
              <i class="fas fa-star"></i>
            </button>
            {% endfor %}
          </div>
          <input type="hidden" name="rating" id="ratingInput" value="">
          <div id="ratingLabel" class="text-muted small mt-2" style="min-height:1.2rem;"></div>
        </div>

        <div class="mb-4 text-start">
          <label class="form-label small fw-semibold">Additional feedback (optional)</label>
          <textarea name="feedback" class="form-control" rows="3"
                    placeholder="Tell us what went well or how we can improve..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn" disabled>
          <i class="fas fa-paper-plane me-2"></i>Submit Rating
        </button>
      </form>
    </div>
  </div>
</div>

<script>
  const labels = ['', 'Very Dissatisfied', 'Dissatisfied', 'Neutral', 'Satisfied', 'Very Satisfied'];
  function selectStar(val) {
    document.getElementById('ratingInput').value = val;
    document.getElementById('ratingLabel').textContent = labels[val];
    document.getElementById('submitBtn').disabled = false;
    document.querySelectorAll('.star-btn').forEach((btn, i) => {
      btn.classList.toggle('selected', i < val);
    });
  }
</script>
</body>
</html>
