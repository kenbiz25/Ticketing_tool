<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>body { background: linear-gradient(135deg, #f0f4ff 0%, #e8f5e9 100%); min-height: 100vh; }</style>
</head>
<body>
<div class="min-vh-100 d-flex align-items-center justify-content-center p-3">
  <div class="card border-0 shadow-lg rounded-4 text-center" style="max-width:480px;width:100%;">
    <div class="card-body p-5">
      {% if already %}
      <i class="fas fa-check-double fa-3x text-secondary mb-3"></i>
      <h2 class="fw-bold">Already Submitted</h2>
      <p class="text-muted">You have already rated this ticket. Thank you!</p>
      {% else %}
      <i class="fas fa-heart fa-3x text-danger mb-3"></i>
      <h2 class="fw-bold">Thank You!</h2>
      <p class="text-muted mb-4">Your feedback helps us improve. We appreciate your time.</p>
      <div class="bg-light rounded-3 p-3 small text-muted">
        Ticket <strong>{{ ticket.sl_no }}</strong> — {{ ticket.issue_type or 'Support Request' }}
      </div>
      {% endif %}
    </div>
  </div>
</div>
</body>
</html>
