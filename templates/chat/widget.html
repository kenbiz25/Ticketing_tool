<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Chat — Support</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .chat-card { max-width: 420px; width: 100%; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.12); overflow: hidden; }
    .chat-header { background: linear-gradient(135deg, #2563eb, #1e40af); color: #fff; padding: 24px; text-align: center; }
    .chat-header .avatar { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 12px; }
  </style>
</head>
<body>
<div class="chat-card">
  <div class="chat-header">
    <div class="avatar">💬</div>
    <h5 class="mb-1 fw-bold">Support Chat</h5>
    <p class="mb-0 small opacity-75">We usually reply within minutes</p>
  </div>
  <div class="card-body p-4">
    <form method="POST" action="{{ url_for('chat.start_session') }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Your Name <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control" placeholder="e.g. Jane Doe" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Email <span class="text-muted small">(optional)</span></label>
        <input type="email" name="email" class="form-control" placeholder="jane@example.com">
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
        Start Chat <i class="ms-1">→</i>
      </button>
    </form>
  </div>
</div>
</body>
</html>
