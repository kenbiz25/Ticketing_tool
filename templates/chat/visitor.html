<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Chat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .chat-wrap { width: 100%; max-width: 480px; height: 100vh; max-height: 680px; display: flex; flex-direction: column; background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.12); overflow: hidden; }
    .chat-head { background: linear-gradient(135deg, #2563eb, #1e40af); color: #fff; padding: 16px 20px; }
    .chat-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 80%; }
    .msg.agent { align-self: flex-start; }
    .msg.visitor { align-self: flex-end; }
    .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: .9rem; line-height: 1.5; }
    .msg.agent .msg-bubble { background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 4px; }
    .msg.visitor .msg-bubble { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
    .msg-meta { font-size: .72rem; color: #9ca3af; margin-top: 3px; }
    .msg.visitor .msg-meta { text-align: right; }
    .chat-foot { padding: 12px 16px; border-top: 1px solid #e5e7eb; background: #fff; }
    .closed-banner { text-align: center; padding: 24px; color: #6b7280; }
  </style>
</head>
<body>
<div class="chat-wrap">
  <div class="chat-head d-flex align-items-center gap-3">
    <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;">💬</div>
    <div>
      <div class="fw-semibold">Support Chat</div>
      <div class="small opacity-75" id="statusLabel">
        {{ 'Closed' if session.status == 'closed' else 'Online' }}
      </div>
    </div>
  </div>

  <div class="chat-body" id="chatBody">
    {% for m in session.messages %}
    <div class="msg {{ m.sender_type }}" data-id="{{ m.id }}">
      <div class="msg-bubble">{{ m.body }}</div>
      <div class="msg-meta">{{ m.sender_name }} · {{ m.created_at.strftime('%H:%M') }}</div>
    </div>
    {% endfor %}
  </div>

  {% if session.status == 'closed' %}
  <div class="closed-banner">
    <i style="font-size:2rem;">🔒</i><br>
    <strong>Chat closed.</strong><br>
    <small>Thank you for reaching out!</small>
  </div>
  {% else %}
  <div class="chat-foot">
    <form id="msgForm" class="d-flex gap-2">
      <input type="text" id="msgInput" class="form-control form-control-sm"
             placeholder="Type a message..." autocomplete="off" required>
      <button type="submit" class="btn btn-primary btn-sm px-3">Send</button>
    </form>
  </div>
  {% endif %}
</div>

<script>
const TOKEN = "{{ session.token }}";
let lastId = {{ (session.messages[-1].id if session.messages else 0) }};

function scrollBottom() {
  const body = document.getElementById('chatBody');
  body.scrollTop = body.scrollHeight;
}
scrollBottom();

function addMessage(m) {
  const body = document.getElementById('chatBody');
  const div = document.createElement('div');
  div.className = `msg ${m.sender_type}`;
  div.dataset.id = m.id;
  div.innerHTML = `<div class="msg-bubble">${m.body}</div>
    <div class="msg-meta">${m.sender_name} · ${m.time}</div>`;
  body.appendChild(div);
  scrollBottom();
  lastId = m.id;
}

async function poll() {
  try {
    const r = await fetch(`/chat/${TOKEN}/poll?since=${lastId}`);
    const data = await r.json();
    if (data.status === 'closed') {
      document.getElementById('statusLabel').textContent = 'Closed';
      document.querySelector('.chat-foot')?.remove();
    }
    data.messages.forEach(addMessage);
  } catch(e) {}
}

setInterval(poll, 3000);

const form = document.getElementById('msgForm');
if (form) {
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = document.getElementById('msgInput');
    const body = input.value.trim();
    if (!body) return;
    input.value = '';
    const fd = new FormData();
    fd.append('body', body);
    await fetch(`/chat/${TOKEN}/message`, { method: 'POST', body: fd });
    poll();
  });
}
</script>
</body>
</html>
